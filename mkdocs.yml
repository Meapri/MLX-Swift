site_name: MLX-VLM Swift Port
site_description: Swift compatibility runtime for MLX VLM models.
site_author: MLX-VLM Swift contributors
repo_name: Meapri/MLX-Swift
site_url: https://Meapri.github.io/MLX-Swift
repo_url: https://github.com/Meapri/MLX-Swift

copyright: "Copyright \u00a9 2026 MLX-VLM Swift contributors"

theme:
    palette:
        - scheme: default
          primary: black
          toggle:
              icon: material/toggle-switch-off-outline
              name: Switch to dark mode
        - scheme: slate
          primary: black
          accent: indigo
          toggle:
              icon: material/toggle-switch
              name: Switch to light mode
    name: material
    icon:
        repo: fontawesome/brands/github
    features:
        - navigation.instant
        - navigation.tracking
        - navigation.top
        - navigation.footer
        - search.highlight
        - search.share
        - content.code.copy
    custom_dir: "docs/overrides"
    font:
        text: Google Sans
        code: Regular

plugins:
    - search

markdown_extensions:
    - admonition
    - abbr
    - attr_list
    - def_list
    - footnotes
    - meta
    - md_in_html
    - pymdownx.superfences
    - pymdownx.highlight:
          linenums: true
    - toc:
          permalink: true

extra:
    consent:
        title: Cookie consent
        description: >-
          We use cookies to recognize your repeated visits and preferences, as well
          as to measure the effectiveness of our documentation and whether users
          find what they're searching for. With your consent, you're helping us to
          make our documentation better.

extra_css:
    - stylesheets/extra.css

nav:
    - Home: index.md
    - Installation: installation.md
    - CLI Reference: cli_reference.md
    - Examples: examples.md
    - Contributing: contributing.md
    - Community Projects: community_projects.md
    - Report Issues: report_issues.md
    - Changelog: changelog.md

docs_dir: docs
